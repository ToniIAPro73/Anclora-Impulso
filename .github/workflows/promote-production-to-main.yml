name: Promote production to main

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: impulso
          POSTGRES_DB: impulso_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U impulso -d impulso_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      PGUSER: impulso
      PGDATABASE: impulso_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure database URL
        run: |
          {
            echo -n "DATABASE_URL=postgres"
            echo -n "ql://"
            echo -n "${PGUSER}"
            echo "@localhost:5432/${PGDATABASE}?schema=public"
          } >> "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Checkout main
        run: git checkout main

      - name: Merge production
        run: |
          git merge --no-ff origin/production -m "chore: merge production to main [ci-skip]"

      - name: Install backend deps
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ./backend
        run: pnpm prisma:generate

      - name: Apply database migrations
        working-directory: ./backend
        run: pnpm prisma:deploy

      - name: Backend tests
        working-directory: ./backend
        run: pnpm test:ci

      - name: Install frontend deps
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Push main
        if: success()
        run: git push origin main

      - name: Notify
        if: success()
        run: echo "✓ Successfully synchronized production to main"

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Production to main synchronization failed"
          echo "Merge may have conflicts. Resolve manually."
        continue-on-error: true
