name: CI

on:
  pull_request:
    branches: [main, development, staging, production]
  push:
    branches: [main, master, development, staging, production]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: impulso
          POSTGRES_PASSWORD: impulso
          POSTGRES_DB: impulso_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U impulso -d impulso_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://impulso:impulso@localhost:5432/impulso_test?schema=public

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ./backend
        run: pnpm prisma:generate

      - name: Apply database migrations
        working-directory: ./backend
        run: pnpm prisma:deploy

      - name: Run backend tests
        working-directory: ./backend
        run: pnpm test:ci

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies (frontend)
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build
