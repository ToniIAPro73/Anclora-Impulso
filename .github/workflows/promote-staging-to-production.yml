name: Promote staging → production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.2.0)"
        required: false

permissions:
  contents: write

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: impulso
          POSTGRES_DB: impulso_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U impulso -d impulso_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://impulso@localhost:5432/impulso_test?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install backend deps
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ./backend
        run: pnpm prisma:generate

      - name: Apply database migrations
        working-directory: ./backend
        run: pnpm prisma:deploy

      - name: Backend tests
        working-directory: ./backend
        run: pnpm test:ci

      - name: Install frontend deps
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Frontend build
        run: npm run build

      - name: Merge staging into production
        run: |
          git checkout production
          git merge --no-ff origin/staging -m "chore: merge staging to production [ci-skip]"
          git push origin production

      - name: Create version tag
        if: ${{ inputs.version != '' }}
        run: |
          git tag "${{ inputs.version }}" production
          git push origin "${{ inputs.version }}"
